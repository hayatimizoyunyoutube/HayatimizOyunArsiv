<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hayatımız Oyun | Youtube Oyun Arşivi</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #fff; font-family: 'Roboto Condensed', sans-serif; display: flex; min-height: 100vh; }

        /* SOL MENÜ */
        .sidebar {
            width: 260px; background: #0a0a0a; border-right: 2px solid #ff0000;
            padding: 25px; position: fixed; height: 100%; overflow-y: auto; z-index: 100;
        }
        .sidebar-title {
            color: #ff0000; font-family: 'Oswald', sans-serif; font-size: 1.2rem;
            margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 8px;
        }
        .menu-list { list-style: none; margin-bottom: 30px; }
        .menu-item {
            padding: 12px 15px; margin-bottom: 8px; background: #111; border-radius: 10px;
            cursor: pointer; transition: 0.3s; font-weight: bold; display: block;
            text-decoration: none; color: #ccc; font-size: 0.9rem; text-align: center;
        }
        .menu-item:hover, .menu-item.active { background: #ff0000; color: #fff; }

        /* ANA İÇERİK */
        .main-content { margin-left: 260px; flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 1000px; }

        .header-area { text-align: center; margin-bottom: 20px; width: 100%; }
        .big-logo { width: 180px; height: auto; margin-bottom: 20px; }
        .search-box { 
            width: 100%; max-width: 550px; padding: 12px 25px; border-radius: 30px; 
            border: 2px solid #ff0000; background: #000; color: #fff; 
            margin: 0 auto 20px; display: block; font-size: 1rem; outline: none;
            text-align: center; font-weight: bold;
        }

        /* DISCORD KUTUSU (BAŞLIĞIN ÜSTÜNDE) */
        .discord-box {
            background: #5865F2; color: white; padding: 15px 20px; border-radius: 12px; 
            text-align: center; margin-bottom: 15px; font-weight: bold; 
            border: 2px dashed #fff; width: 100%;
        }
        .discord-btn {
            display: inline-block; background: white; color: #5865F2; 
            padding: 6px 20px; border-radius: 6px; text-decoration: none; 
            font-weight: 900; margin-top: 8px; font-size: 0.85rem;
        }

        /* ANA KATEGORİ ŞERİDİ */
        .main-category-divider {
            background: #fff; color: #000; padding: 15px; font-weight: 900; 
            font-size: 1.8rem; border-radius: 10px; margin-bottom: 20px; 
            text-transform: uppercase; font-family: 'Oswald', sans-serif; text-align: center;
            width: 100%; border-bottom: 5px solid #ff0000;
        }

        /* HARF ŞERİTLERİ */
        .letter-divider { 
            background: #ff0000; color: #fff; padding: 10px; font-weight: bold; 
            font-size: 1.4rem; border-radius: 8px; margin: 30px 0 12px 0; 
            text-transform: uppercase; font-family: 'Oswald', sans-serif; text-align: center;
            width: 100%;
        }

        .game-row { 
            background: #0d0d0d; border: 1px solid #1a1a1a; padding: 12px 20px; 
            margin-bottom: 8px; display: flex; align-items: center; border-radius: 10px; width: 100%;
        }
        .game-title { font-weight: bold; font-size: 1.1rem; color: #fff; flex: 1; }

        .badge { padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; margin-right: 8px; text-transform: uppercase; }

        .izle-btn { 
            text-decoration: none; color: #fff; background: #111; border: 1px solid #333; 
            padding: 8px 18px; border-radius: 8px; font-weight: bold; display: flex; 
            align-items: center; font-size: 0.9rem; margin-left: 20px;
        }
        .izle-btn:hover:not(.disabled) { background: #ff0000; border-color: #fff; }
        .disabled { opacity: 0.3; cursor: not-allowed; }
        .play-icon { color: #ff0000; margin-right: 8px; }

        .nav-container { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: center; width: 100%; }
        .letter-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px 12px; margin: 3px; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">Oynanan Seriler</div>
        <div class="menu-list">
            <a href="#" class="menu-item active" onclick="changeCategory('oynanan', this, 'TAMAMLANANLAR')">Tamamlananlar</a>
            <a href="#" class="menu-item" onclick="changeCategory('canli', this, 'DEVAM EDENLER')">Devam Edenler</a>
        </div>
        <div class="sidebar-title">Oynanacak Seriler</div>
        <div class="menu-list">
            <a href="#" class="menu-item" onclick="changeCategory('planlanan', this, 'YAKINDA BAŞLAYACAKLAR')">Yakında</a>
            <a href="#" class="menu-item" onclick="changeCategory('istek', this, 'SİZDEN GELENLER')">Sizden Gelenler</a>
        </div>
    </div>

    <div class="main-content">
        <div class="wrapper">
            <div class="header-area">
                <img src="img/logo.png" alt="Logo" class="big-logo">
                <input type="text" id="searchInput" class="search-box" placeholder="OYUN ARA..." onkeyup="searchFn()">
            </div>

            <div id="letterNav" class="nav-container">
                <div id="letterBox"></div>
            </div>

            <!-- DISCORD VE BAŞLIK ALANI -->
            <div id="mainHeaderArea"></div>
            
            <div id="gameGrid"></div>
        </div>
    </div>

<script>
    let allGames = [];
    const alphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ1".split('');

    const lb = document.getElementById('letterBox');
    alphabet.forEach(l => {
        lb.innerHTML += `<a href="#section-${l}" class="letter-btn">${l}</a>`;
    });

    async function init() {
        try {
            const r = await fetch('videolar.txt');
            const t = await r.text();
            allGames = t.trim().split('\n').map(line => {
                const p = line.split('|');
                return {
                    name: p[0]?.trim() || "",
                    url: p[1]?.trim() || "#",
                    tags: p[2]?.split(',') || [],
                    type: p[3]?.trim().toLowerCase() || "oynanan"
                };
            }).filter(g => g.name !== "");
            
            allGames.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
            changeCategory('oynanan', document.querySelector('.menu-item'), 'TAMAMLANANLAR');
        } catch (e) { console.error("Hata!"); }
    }

    function renderList(data, useDividers = false) {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = "";
        let lastLetter = "";

        data.forEach(game => {
            const firstLetter = game.name.charAt(0).toUpperCase();
            if (useDividers && firstLetter !== lastLetter) {
                lastLetter = firstLetter;
                grid.innerHTML += `<div id="section-${lastLetter}" class="letter-divider">${lastLetter} SERİSİ</div>`;
            }

            let tagHtml = "";
            game.tags.forEach(tg => {
                const clean = tg.trim();
                if(!clean) return;
                let style = "background-color: #222; color: #fff; border: 1px solid #444;";
                if (clean.toLowerCase().includes("türkçe")) style = "background-color: #ff0000; color: #fff;";
                if (clean.toLowerCase().includes("coop")) style = "background-color: #f1c40f; color: #000;";
                tagHtml += `<span class="badge" style="${style}">${clean}</span>`;
            });

            let buttonHtml = (game.url === "#" || game.url === "") 
                ? `<span class="izle-btn disabled">YAKINDA</span>`
                : `<a href="${game.url}" target="_blank" class="izle-btn"><span class="play-icon">▶</span> İZLE</a>`;

            grid.innerHTML += `<div class="game-row"><span class="game-title">${game.name}</span><div style="display:flex; align-items:center;">${tagHtml}</div>${buttonHtml}</div>`;
        });
    }

    function changeCategory(cat, element, title) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        
        const headerArea = document.getElementById('mainHeaderArea');
        let content = "";

        // Discord kutusunu BAŞLIĞIN ÜSTÜNE koyuyoruz
        if (cat === 'istek') {
            content += `
                <div class="discord-box">
                    <p style="font-size: 1.1rem;">🎮 Oyun istekleriniz için Discord kanalımıza gelebilirsiniz!</p>
                    <a href="https://discord.gg/QXc74Q6UUE" target="_blank" class="discord-btn">DISCORD'A KATIL</a>
                </div>`;
        }

        // Ana başlık şeridi hemen altında
        content += `<div class="main-category-divider">${title}</div>`;
        headerArea.innerHTML = content;

        const filtered = allGames.filter(g => g.type === cat);
        document.getElementById('letterNav').style.display = (cat === 'oynanan') ? 'block' : 'none';
        renderList(filtered, cat === 'oynanan');
    }

    function searchFn() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        if (v.length > 0) {
            document.getElementById('letterNav').style.display = 'none';
            document.getElementById('mainHeaderArea').innerHTML = `<div class="main-category-divider">ARAMA SONUÇLARI</div>`;
            renderList(allGames.filter(x => x.name.toLowerCase().includes(v)), true);
        } else {
            document.querySelector('.menu-item.active').click();
        }
    }

    init();
</script>
</body>
</html>
